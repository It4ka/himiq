<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>⚠️ Внимавай за...</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
  color: white;
  overflow: hidden;
}

h1 {
  font-size: 40px;
  text-shadow: 0 0 20px cyan;
}

.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 40px;
  margin: 40px auto;
  width: 60%;
  border-radius: 20px;
  font-size: 26px;
  box-shadow: 0 0 30px rgba(0,255,255,0.5);
  transition: 0.4s;
}

button {
  padding: 15px 30px;
  margin: 10px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

.phosphorus {
  background: #00c853;
  box-shadow: 0 0 15px #00ff88;
}

.arsenic {
  background: #d50000;
  box-shadow: 0 0 15px red;
}

.correct {
  animation: flashGreen 0.5s;
}

.wrong {
  animation: flashRed 0.5s;
}

@keyframes flashGreen {
  0% { background: green; }
  100% { background: rgba(255,255,255,0.1); }
}

@keyframes flashRed {
  0% { background: red; }
  100% { background: rgba(255,255,255,0.1); }
}

#timer {
  font-size: 22px;
  margin: 10px;
}

.low-time {
  color: red;
  font-weight: bold;
}

#score, #progress {
  font-size: 18px;
}

</style>
</head>

<body>

<h1>🧪 Внимавай за…</h1>
<h2>Фосфор 🟢 или Арсен ☠️</h2>

<div id="score">Точки: 0</div>
<div id="progress">Въпрос: 0/0</div>
<div id="timer">⏳ 10</div>

<div class="card" id="question">Натисни старт!</div>

<button onclick="startGame()">▶️ Старт</button>
<br><br>

<button class="phosphorus" onclick="answer('phosphorus')">🟢 Фосфор</button>
<button class="arsenic" onclick="answer('arsenic')">☠️ Арсен</button>

<div id="result"></div>

<script>

const cards = [
{ q: "Изгражда костите и зъбите", a: "phosphorus" },
{ q: "Силно токсичен елемент", a: "arsenic" },
{ q: "Част от ДНК", a: "phosphorus" },
{ q: "Замърсява водите", a: "arsenic" },
{ q: "Участва в ATP", a: "phosphorus" },
{ q: "Опасен за хората", a: "arsenic" },
{ q: "Важен за растенията", a: "phosphorus" },
{ q: "Причинява отравяне", a: "arsenic" }
];

let current = 0;
let score = 0;
let time = 10;
let timer;

function startGame() {
  current = 0;
  score = 0;
  nextCard();
}

function nextCard() {
  if (current >= cards.length) {
    endGame();
    return;
  }

  document.getElementById("question").textContent = cards[current].q;
  document.getElementById("progress").textContent =
    `Въпрос: ${current+1}/${cards.length}`;
  document.getElementById("score").textContent = "Точки: " + score;

  startTimer();
}

function startTimer() {
  clearInterval(timer);
  time = 10;

  timer = setInterval(() => {
    time--;
    let t = document.getElementById("timer");
    t.textContent = "⏳ " + time;

    if (time <= 3) t.classList.add("low-time");
    else t.classList.remove("low-time");

    if (time <= 0) {
      clearInterval(timer);
      wrong("⏰ Времето изтече!");
    }
  }, 1000);
}

function answer(choice) {
  clearInterval(timer);

  if (choice === cards[current].a) {
    correct();
  } else {
    wrong("❌ Грешно!");
  }
}

function correct() {
  score++;
  flash("correct");
  playSound(900);
  document.getElementById("result").textContent = "✅ Правилно!";
  next();
}

function wrong(msg) {
  flash("wrong");
  playSound(200);
  document.getElementById("result").textContent = msg;
  next();
}

function flash(type) {
  let card = document.getElementById("question");
  card.classList.add(type);
  setTimeout(() => card.classList.remove(type), 500);
}

function next() {
  current++;
  setTimeout(nextCard, 1000);
}

function endGame() {
  let text = "";

  if (score <= 3) text = "⚠️ Внимавай повече!";
  else if (score <= 6) text = "👍 Добре!";
  else text = "🏆 ЕКСПЕРТ!";

  document.getElementById("question").textContent = "🎉 Край!";
  document.getElementById("result").textContent = text;
}

function playSound(freq) {
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.frequency.value = freq;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(() => osc.stop(), 150);
}

</script>

</body>
</html>
